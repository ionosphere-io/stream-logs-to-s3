# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for more information:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://containers.dev/guide/dependabot

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    exclude-paths:
      - "scratchstack-services/**"
    groups:
      all-dependencies:
        patterns:
          - "*"
    ignore:
      # rand and quinn are resolved into the lockfile as optional deps of
      # reqwest (http3 feature) but are never actually compiled. Dependabot
      # can't update them, so ignore them.
      - dependency-name: "rand"
      - dependency-name: "rand_core"
      - dependency-name: "rand_chacha"
      - dependency-name: "quinn"
      - dependency-name: "quinn-proto"
      - dependency-name: "quinn-udp"
    schedule:
      interval: weekly
      day: "tuesday"
      time: "04:23"
      timezone: "America/Los_Angeles"